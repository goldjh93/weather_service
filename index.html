<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open-Meteo 날씨 검색</title>
  <style>
    :root {
      --bg: #f7f7f2;
      --ink: #202124;
      --muted: #666f7a;
      --line: #d8ddd4;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --warm: #d9480f;
      --warn-bg: #fff4e6;
      --warn-line: #ffc078;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .container {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }
    .topbar {
      padding: 28px 0 24px;
    }
    h1, h2, p {
      margin: 0;
    }
    h1 {
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .lead {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.5;
    }
    .search-band {
      padding: 22px 0;
      border-bottom: 1px solid var(--line);
      background: #eef6f4;
    }
    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }
    input[type="search"] {
      width: 100%;
      min-height: 48px;
      border: 1px solid #b8c7c3;
      border-radius: 6px;
      padding: 0 14px;
      font-size: 16px;
      background: #fff;
      color: var(--ink);
    }
    button {
      min-height: 48px;
      border: 0;
      border-radius: 6px;
      padding: 0 18px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }
    button:hover {
      background: var(--accent-dark);
    }
    button:disabled {
      cursor: wait;
      opacity: 0.72;
    }
    main {
      padding: 28px 0 44px;
    }
    .status {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: var(--panel);
      display: grid;
      gap: 6px;
    }
    .status.error {
      border-color: var(--warn-line);
      background: var(--warn-bg);
    }
    .summary-band {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 1.4fr);
      gap: 24px;
      align-items: start;
      padding: 24px 0 30px;
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      margin-bottom: 6px;
      color: var(--accent-dark);
      font-size: 13px;
      font-weight: 800;
    }
    .summary-band h2, .chart-section h2, .table-section h2 {
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .muted {
      margin-top: 8px;
      color: var(--muted);
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 0;
    }
    .metrics div {
      min-height: 88px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: var(--panel);
    }
    dt {
      color: var(--muted);
      font-size: 13px;
    }
    dd {
      margin: 8px 0 0;
      font-size: 20px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }
    .chart-section, .table-section {
      padding: 30px 0 0;
    }
    .temperature-chart {
      display: block;
      width: 100%;
      height: auto;
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .temperature-chart rect {
      fill: #fff;
    }
    .temperature-chart .grid line {
      stroke: #dde3df;
      stroke-dasharray: 4 6;
    }
    .temperature-chart .grid text,
    .temperature-chart .axis text,
    .temperature-chart .x-label {
      fill: #65707a;
      font-size: 13px;
    }
    .temperature-chart .axis line {
      stroke: #9aa6a1;
    }
    .temperature-chart .area {
      fill: #d6f3ee;
      opacity: 0.78;
    }
    .temperature-chart .line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .temperature-chart .markers circle {
      fill: #fff;
      stroke: var(--warm);
      stroke-width: 3;
    }
    .table-wrap {
      margin-top: 14px;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }
    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }
    th {
      background: #f0f3ef;
      font-size: 13px;
      color: #3f474f;
    }
    tr:last-child td {
      border-bottom: 0;
    }
    @media (max-width: 820px) {
      form, .summary-band, .metrics {
        grid-template-columns: 1fr;
      }
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container topbar">
      <h1>Open-Meteo 날씨 검색</h1>
      <p class="lead">도시나 지역명을 입력하면 오늘의 시간별 날씨와 기온 그래프를 불러옵니다.</p>
    </div>
  </header>
  <section class="search-band">
    <div class="container">
      <form id="weather-form">
        <input
          id="location-input"
          type="search"
          name="location"
          value="Seoul"
          placeholder="예: Seoul, Busan, New York, Tokyo"
          aria-label="위치 검색"
          required
        >
        <button id="search-button" type="submit">검색</button>
      </form>
    </div>
  </section>
  <main class="container" id="result">
    <section class="status">
      <strong>위치를 검색하세요.</strong>
      <span>검색하면 Flask API가 Open-Meteo API에서 오늘 날씨를 불러옵니다.</span>
    </section>
  </main>

  <script>
    const form = document.querySelector("#weather-form");
    const input = document.querySelector("#location-input");
    const button = document.querySelector("#search-button");
    const result = document.querySelector("#result");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function timeLabel(value) {
      return value.slice(11, 16);
    }

    function hourLabel(value) {
      return value.slice(11, 13);
    }

    function renderTemperatureSvg(rows, unit) {
      const width = 1040;
      const height = 430;
      const left = 58;
      const right = 24;
      const top = 28;
      const bottom = 54;
      const chartWidth = width - left - right;
      const chartHeight = height - top - bottom;
      const temperatures = rows.map((row) => row.temperature);
      const minTemp = Math.min(...temperatures);
      const maxTemp = Math.max(...temperatures);
      const padding = Math.max((maxTemp - minTemp) * 0.12, 1);
      const yMin = minTemp - padding;
      const yMax = maxTemp + padding;
      const span = yMax - yMin;
      const points = temperatures.map((temperature, index) => {
        const x = left + (chartWidth * index / (rows.length - 1));
        const y = top + chartHeight - ((temperature - yMin) / span * chartHeight);
        return { x, y, temperature, time: rows[index].time };
      });
      const polyline = points.map((point) => `${point.x.toFixed(1)},${point.y.toFixed(1)}`).join(" ");
      const areaPoints = `${left},${top + chartHeight} ${polyline} ${left + chartWidth},${top + chartHeight}`;
      const yTicks = Array.from({ length: 5 }, (_, index) => yMin + ((yMax - yMin) * index / 4));
      const grid = yTicks.map((tick) => {
        const y = top + chartHeight - ((tick - yMin) / span * chartHeight);
        return `
          <g>
            <line x1="${left}" y1="${y.toFixed(1)}" x2="${left + chartWidth}" y2="${y.toFixed(1)}"></line>
            <text x="${left - 10}" y="${(y + 4).toFixed(1)}" text-anchor="end">${tick.toFixed(1)}${escapeHtml(unit)}</text>
          </g>
        `;
      }).join("");
      const hourLabels = points
        .filter((_, index) => index % 3 === 0)
        .map((point) => `
          <g>
            <line x1="${point.x.toFixed(1)}" y1="${top + chartHeight}" x2="${point.x.toFixed(1)}" y2="${top + chartHeight + 6}"></line>
            <text x="${point.x.toFixed(1)}" y="${top + chartHeight + 26}" text-anchor="middle">${hourLabel(point.time)}</text>
          </g>
        `)
        .join("");
      const markers = points.map((point) => `
        <circle cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="4">
          <title>${timeLabel(point.time)} - ${point.temperature}${escapeHtml(unit)}</title>
        </circle>
      `).join("");

      return `
        <svg class="temperature-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="오늘 시간별 기온 그래프">
          <rect x="0" y="0" width="${width}" height="${height}" rx="8"></rect>
          <g class="grid">${grid}</g>
          <g class="axis">
            <line x1="${left}" y1="${top + chartHeight}" x2="${left + chartWidth}" y2="${top + chartHeight}"></line>
            ${hourLabels}
          </g>
          <polygon class="area" points="${areaPoints}"></polygon>
          <polyline class="line" points="${polyline}"></polyline>
          <g class="markers">${markers}</g>
          <text class="x-label" x="${left + chartWidth / 2}" y="${height - 10}" text-anchor="middle">Hour</text>
        </svg>
      `;
    }

    function renderWeather(data) {
      const rows = data.rows;
      const units = data.units;
      const current = rows[data.summary.currentIndex] || rows[0];
      const label = escapeHtml(data.location.label);
      const timezone = escapeHtml(data.location.timezone);
      const temps = rows.map((row) => row.temperature);
      const tableRows = rows.map((row) => `
        <tr>
          <td>${timeLabel(row.time)}</td>
          <td>${row.temperature}${escapeHtml(units.temperature)}</td>
          <td>${row.humidity}${escapeHtml(units.humidity)}</td>
          <td>${row.rainProbability}${escapeHtml(units.rainProbability)}</td>
          <td>${row.precipitation}${escapeHtml(units.precipitation)}</td>
          <td>${row.windSpeed}${escapeHtml(units.windSpeed)}</td>
          <td>${escapeHtml(row.weather)}</td>
        </tr>
      `).join("");

      result.innerHTML = `
        <section class="summary-band">
          <div>
            <p class="eyebrow">오늘 날씨</p>
            <h2>${label}</h2>
            <p class="muted">시간대: ${timezone}</p>
          </div>
          <dl class="metrics">
            <div>
              <dt>현재 기온</dt>
              <dd>${current.temperature}${escapeHtml(units.temperature)}</dd>
            </div>
            <div>
              <dt>최저 / 최고</dt>
              <dd>${Math.min(...temps)} / ${Math.max(...temps)}${escapeHtml(units.temperature)}</dd>
            </div>
            <div>
              <dt>강수 확률</dt>
              <dd>${current.rainProbability}${escapeHtml(units.rainProbability)}</dd>
            </div>
            <div>
              <dt>상태</dt>
              <dd>${escapeHtml(current.weather)}</dd>
            </div>
          </dl>
        </section>
        <section class="chart-section">
          <h2>시간별 기온 그래프</h2>
          ${renderTemperatureSvg(rows, units.temperature)}
        </section>
        <section class="table-section">
          <h2>시간별 상세 예보</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>시간</th>
                  <th>기온</th>
                  <th>습도</th>
                  <th>강수 확률</th>
                  <th>강수량</th>
                  <th>풍속</th>
                  <th>날씨</th>
                </tr>
              </thead>
              <tbody>${tableRows}</tbody>
            </table>
          </div>
        </section>
      `;
    }

    async function searchWeather(location) {
      button.disabled = true;
      result.innerHTML = `
        <section class="status">
          <strong>날씨를 불러오는 중입니다.</strong>
          <span>${escapeHtml(location)}의 좌표와 오늘의 시간별 예보를 조회하고 있습니다.</span>
        </section>
      `;

      try {
        const response = await fetch(`/api?location=${encodeURIComponent(location)}`);
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "날씨 정보를 불러오지 못했습니다.");
        }
        renderWeather(data);
      } catch (error) {
        result.innerHTML = `
          <section class="status error">
            <strong>검색 실패</strong>
            <span>${escapeHtml(error.message)}</span>
          </section>
        `;
      } finally {
        button.disabled = false;
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const location = input.value.trim();
      if (location) {
        searchWeather(location);
      }
    });
  </script>
</body>
</html>
